<div class="row">
    <div class="col-md-4 mb-3 " *ngFor="let blog of blogData; trackBy : trackbydun">
        <mat-card class="h-100">
            <mat-card-title>
                {{blog.title}}
            </mat-card-title>
            <mat-card-content>
                {{blog.content}}
            </mat-card-content>
            <mat-card-actions class="d-flex justify-content-between">
                <button 
                (click)="onEdit(blog)"
                mat-mini-fab color="primary"><mat-icon>edit</mat-icon></button>
                <button 
                (click)="onRemove(blog.id)"
                 mat-mini-fab color="warn"><mat-icon>delete</mat-icon></button>
            </mat-card-actions>
        </mat-card>
    </div>
</div>
